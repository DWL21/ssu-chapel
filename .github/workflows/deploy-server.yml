name: Deploy Server Stack

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'rusaint-wasm/**'
      - 'rusaint/**'
      - 'nginx/**'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      worker: ${{ steps.filter.outputs.worker }}
      backend: ${{ steps.filter.outputs.backend }}
      nginx: ${{ steps.filter.outputs.nginx }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            worker:
              - 'rusaint-wasm/**'
              - 'rusaint/**'
            backend:
              - 'backend/**'
            nginx:
              - 'nginx/**'

  build-worker:
    needs: detect-changes
    if: needs.detect-changes.outputs.worker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: rusaint-wasm/Dockerfile
          push: true
          tags: ghcr.io/dwl21/ssu-chapel/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ghcr.io/dwl21/ssu-chapel/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-nginx:
    needs: detect-changes
    if: needs.detect-changes.outputs.nginx == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: nginx
          push: true
          tags: ghcr.io/dwl21/ssu-chapel/nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-worker, build-backend, build-nginx]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Setup SSH known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: SSH Deploy
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ssh "${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}" bash << ENDSSH
          set -e
          cd "${{ vars.DEPLOY_PATH }}"
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker compose pull worker backend nginx
          docker compose up -d --no-build
          docker image prune -f
          ENDSSH
