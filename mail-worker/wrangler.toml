name = "ssu-mails-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# 매일 08:00 KST = 23:00 UTC (전날)
[triggers]
crons = ["0 23 * * *"]

[vars]
DEV_MODE = "false"
# Resend 무료: 도메인 미인증 시 onboarding@resend.dev 로만 발송 가능
# 커스텀 도메인 인증 후 noreply@your-domain.kr 로 교체
MAIL_FROM = "onboarding@resend.dev"
MAIL_FROM_NAME = "SSU 공지사항"
# 프론트엔드 오리진 (구독 해지 링크 생성용)
FRONTEND_ORIGIN = "https://ssu-mails.pages.dev"
# 스크래핑 타겟
SCATCH_BASE = "https://scatch.ssu.ac.kr"

[[d1_databases]]
binding = "DB"
database_name = "ssu-mails"
database_id = "73f247c2-8927-4f0d-830f-6620bbe4a828"

# 개발 시 CORS 허용 오리진. 프로덕션은 특정 도메인만 허용하려면 주석 해제.
# [env.production.vars]
# ALLOWED_ORIGIN = "https://ssu-mails.pages.dev"
